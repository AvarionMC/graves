name: Gradle Release

on:
  release:
    types: [ created ]

defaults:
  run:
    shell: bash

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'adopt'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          # Cache ~/.gradle (modules, build-cache, wrapper).
          cache-disabled: false

      - name: Set outputs
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          CURRENT_VERSION="${TAG#v}"

          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "CURRENT_VERSION=$CURRENT_VERSION" >> "$GITHUB_ENV"

      - name: Publish the jar file
        run: ./gradlew --no-daemon -Pversion=${CURRENT_VERSION} publish -x copyToTestServer
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Add jar file to release
        run: gh release upload "${TAG}" "build/libs/Graves-${CURRENT_VERSION}.jar" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
